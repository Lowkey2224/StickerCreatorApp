name: Security Scan

on:
  push:
    branches: [ main, develop, more-tests ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: high
        allow-licenses: Apache-2.0, MIT, BSD-2-Clause, BSD-3-Clause
        
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      actions: read
      contents: read
      security-events: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: java
        queries: security-and-quality
        
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-home-cache-cleanup: true
        
    - name: Build for CodeQL
      run: ./gradlew assembleDebug
      
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:java"

  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'  # Skip on scheduled runs
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/gradle@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --file=app/build.gradle
        
    - name: Upload Snyk Results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: snyk.sarif

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [codeql-analysis]
    if: always()
    
    steps:
    - name: Security Scan Summary
      run: |
        echo "## 🛡️ Security Scan Summary"
        echo ""
        echo "| Scan Type | Status |"
        echo "|-----------|--------|"
        echo "| CodeQL Analysis | ${{ needs.codeql-analysis.result == 'success' && '✅ Passed' || '❌ Failed' }} |"
        
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "| Dependency Review | ${{ needs.dependency-review.result == 'success' && '✅ Passed' || needs.dependency-review.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |"
        fi
        
        echo ""
        echo "### 📋 Security Recommendations"
        echo "- Review any security alerts in the GitHub Security tab"
        echo "- Keep dependencies updated to latest versions"
        echo "- Monitor for new vulnerabilities in project dependencies"
        echo "- Consider enabling Dependabot for automated dependency updates"
