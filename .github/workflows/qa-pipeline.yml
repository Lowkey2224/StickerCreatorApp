name: QA Pipeline

on:
  push:
    branches: [ main, develop, more-tests ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Parallel QA Jobs
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-home-cache-cleanup: true
        
    - name: Run Android Lint
      run: ./gradlew lintDebug
      
    - name: Upload Lint Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: |
          app/build/reports/lint-results-debug.html
          app/build/reports/lint-results-debug.xml
        retention-days: 30

  detekt:
    name: Detekt Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-home-cache-cleanup: true
        
    - name: Run Detekt
      run: ./gradlew detekt
      
    - name: Upload Detekt Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: detekt-results
        path: |
          app/build/reports/detekt/detekt.html
          app/build/reports/detekt/detekt.xml
        retention-days: 30

  unit-tests:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-home-cache-cleanup: true
        
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest
      
    - name: Generate Coverage Report
      run: ./gradlew jacocoTestReport
      
    - name: Verify Coverage
      run: ./gradlew jacocoTestCoverageVerification
      continue-on-error: true
      
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          app/build/reports/tests/testDebugUnitTest/
          app/build/test-results/testDebugUnitTest/
        retention-days: 30
        
    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-reports
        path: |
          app/build/reports/jacoco/test/
        retention-days: 30
        
    - name: List Coverage Files (Debug)
      run: |
        echo "Checking for coverage files..."
        find . -name "*.xml" -path "*/jacoco/*" -type f || true
        ls -la app/build/reports/jacoco/test/ || true
        
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      if: always()
      with:
        files: app/build/reports/jacoco/test/jacocoTestReport.xml
        directory: ./app/build/reports/jacoco/test/
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        verbose: true

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-home-cache-cleanup: true
        
    - name: Cache OWASP Database
      uses: actions/cache@v3
      with:
        path: |
          app/owasp-dependency-check-data
        key: ${{ runner.os }}-owasp-${{ hashFiles('**/build.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-owasp-
          
    - name: Run Dependency Check
      run: ./gradlew dependencyCheckAnalyze
      continue-on-error: true
      
    - name: Upload Dependency Check Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: dependency-check-results
        path: |
          app/build/reports/dependency-check-report.html
          app/build/reports/dependency-check-report.xml
          app/build/reports/dependency-check-report.json
        retention-days: 30

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-home-cache-cleanup: true
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

  # Quality Gate Job (runs after all parallel jobs)
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, detekt, unit-tests, dependency-check, build-check]
    if: always()
    timeout-minutes: 5
    
    steps:
    - name: Check Quality Gate
      run: |
        echo "Quality Gate Results:"
        echo "Lint: ${{ needs.lint.result }}"
        echo "Detekt: ${{ needs.detekt.result }}"
        echo "Unit Tests: ${{ needs.unit-tests.result }}"
        echo "Dependency Check: ${{ needs.dependency-check.result }}"
        echo "Build Check: ${{ needs.build-check.result }}"
        
        # Fail if any critical checks failed
        if [[ "${{ needs.lint.result }}" == "failure" ]]; then
          echo "❌ Android Lint failed"
          exit 1
        fi
        
        if [[ "${{ needs.detekt.result }}" == "failure" ]]; then
          echo "❌ Detekt static analysis failed"
          exit 1
        fi
        
        if [[ "${{ needs.unit-tests.result }}" == "failure" ]]; then
          echo "❌ Unit tests failed"
          exit 1
        fi
        
        if [[ "${{ needs.build-check.result }}" == "failure" ]]; then
          echo "❌ Build verification failed"
          exit 1
        fi
        
        # Dependency check is allowed to be skipped/cancelled but not failed
        if [[ "${{ needs.dependency-check.result }}" == "failure" ]]; then
          echo "⚠️  Dependency check found vulnerabilities"
          # Don't fail the build, just warn
        fi
        
        echo "✅ Quality Gate Passed!"

  # Summary Job for PR Comments
  pr-comment:
    name: PR Comment
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.event_name == 'pull_request' && always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      continue-on-error: true
      
    - name: Comment PR
      uses: actions/github-script@v7
      with:
        script: |
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && comment.body.includes('QA Pipeline Results')
          );
          
          const qualityGateResult = '${{ needs.quality-gate.result }}';
          const status = qualityGateResult === 'success' ? '✅ PASSED' : '❌ FAILED';
          
          const body = `## QA Pipeline Results ${status}
          
          | Check | Status |
          |-------|--------|
          | Android Lint | ${{ needs.lint.result == 'success' && '✅' || '❌' }} |
          | Detekt | ${{ needs.detekt.result == 'success' && '✅' || '❌' }} |
          | Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅' || '❌' }} |
          | Dependency Check | ${{ needs.dependency-check.result == 'success' && '✅' || needs.dependency-check.result == 'skipped' && '⏭️' || '⚠️' }} |
          | Build | ${{ needs.build-check.result == 'success' && '✅' || '❌' }} |
          
          📊 **Artifacts Available:**
          - Test Results & Coverage Reports
          - Static Analysis Reports
          - Security Scan Results
          - Debug APK
          
          _Updated at ${new Date().toISOString()}_`;
          
          if (botComment) {
            github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body
            });
          } else {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }
